version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: bgmi-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bgmi
    ports:
      - "5433:5432"
    volumes:
      - bgmi_pg_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: bgmi-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  minio:
    image: minio/minio:latest
    container_name: bgmi-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - bgmi_minio_data:/data

volumes:
  bgmi_pg_data:
  bgmi_minio_data:
